<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Companion AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>🎵 Event Companion AI</h1>

        <p class="subtitle">
            Seu assistente inteligente para eventos.
        </p>

        <form method="POST">
            <input
                type="text"
                name="event"
                placeholder="Ex: Olivia Rodrigo no Madison Square Garden"
                required
            >

            <button type="submit">
                Criar Plano
            </button>
        </form>

        {% if message %}
        <div class="result">
            {{ message | replace('\n', '<br>') | safe }}
        </div>
        {% endif %}
    </div>

</body>
</html>
